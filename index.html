<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szkolny Konkurs Matematyczny - Trening</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .header-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        h1 {
            text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db;
            padding-bottom: 10px; margin-top: 0; margin-bottom: 15px;
        }
        .description { text-align: center; font-size: 1.1em; color: #555; margin: 0; }
        
        .section-header {
            background: #2c3e50; color: #fff; padding: 15px 20px; 
            margin-top: 40px; margin-bottom: 10px; border-radius: 8px;
        }
        .section-header h2 { margin: 0; font-size: 1.3em; }
        .section-theory {
            background: #eec15b3b; border-left: 4px solid #f39c12; 
            padding: 12px 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0;
            font-size: 0.95em; color: #444;
        }

        .task-card {
            background: #fff; padding: 20px 25px; margin-bottom: 20px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 6px solid #3498db; transition: all 0.3s;
        }
        .task-card.correct-bg { background-color: #d4edda; border-left-color: #28a745; }
        .task-card.incorrect-bg { background-color: #f8d7da; border-left-color: #dc3545; }
        .task-text { font-size: 1.1em; margin-bottom: 15px; }
        
        .input-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        input[type="text"] {
            padding: 10px; font-size: 1em; border: 2px solid #e2e8f0;
            border-radius: 6px; flex-grow: 1; max-width: 300px; outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        
        button {
            background-color: #3498db; color: white; border: none; padding: 10px 20px;
            font-size: 1em; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-hint { background-color: #f39c12; }
        button.btn-hint:hover { background-color: #d68910; }
        button.btn-answer { background-color: #9b59b6; }
        button.btn-answer:hover { background-color: #8e44ad; }
        
        .feedback { font-weight: bold; margin-left: 10px; }
        .correct { color: #1e8449; }
        .incorrect { color: #c0392b; }
        .hint-text { display: none; margin-top: 15px; padding: 12px; background-color: #fff3cd; border-left: 4px solid #ffc107; font-style: italic; color: #856404; border-radius: 0 6px 6px 0; }

        /* MODAL */
        #start-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 12px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content input {
            width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; text-align: center;
            font-size: 1.1em; border: 2px solid #e2e8f0; border-radius: 6px;
        }
        .modal-content button { width: 100%; font-size: 1.1em; padding: 12px; background-color: #27ae60;}
        .modal-content button:hover { background-color: #2ecc71;}
        
        #app-content { display: none; }
        
        .finish-container {
            text-align: center; background: rgba(255,255,255,0.95); padding: 30px;
            border-radius: 12px; margin-top: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .btn-finish { background-color: #e74c3c; font-size: 1.2em; padding: 15px 30px; }
        .btn-finish:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div id="start-modal">
        <div class="modal-content">
            <h2>Witaj! 👋</h2>
            <p>Przed rozpoczęciem treningu wpisz swoje dane:</p>
            <input type="text" id="student-name" placeholder="Imię i nazwisko" required>
            <input type="text" id="student-class" placeholder="Klasa (np. 4A)" required>
            <button onclick="startTest()">Rozpocznij trening</button>
            <p id="modal-error" style="color: red; font-size: 0.9em; display: none;">Proszę wypełnić wszystkie pola!</p>
        </div>
    </div>

    <div id="app-content">
        <div class="header-container">
            <h1>Szkolny Konkurs Matematyczny</h1>
            <p class="description">Rozwiąż zadania przygotowawcze podzielone na tematy. Przeczytaj uważnie wskazówki teoretyczne przed każdą sekcją!</p>
        </div>

        <div id="tasks-container"></div>

        <div class="finish-container">
            <h2 id="finish-text">Skończyłeś cały trening? Wyślij wyniki do nauczyciela!</h2>
            <button class="btn-finish" id="btn-submit" onclick="sendResults()">Wyślij wyniki 📧</button>
        </div>
    </div>

    <script>
        let currentStudent = "";
        let currentClass = "";
        let resultsData = {}; 
        let userAttempts = {};

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            const classInput = document.getElementById("student-class").value.trim();
            
            if(nameInput === "" || classInput === "") {
                document.getElementById("modal-error").style.display = "block";
                return;
            }
            
            currentStudent = nameInput;
            currentClass = classInput;
            
            document.getElementById("start-modal").style.display = "none";
            document.getElementById("app-content").style.display = "block";
        }

        const sectionsData = [
            {
                title: "Blok 1: Kolejność działań",
                theory: "<b>Ważne na konkursie:</b> Pamiętaj o kolejności wykonywania działań! Najpierw wykonujemy działania w nawiasach. Potem mnożenie i dzielenie w kolejności od lewej do prawej. Na końcu wykonujemy dodawanie i odejmowanie (również od lewej do prawej).",
                tasks: [
                    { id: 1, text: "Oblicz: 25 + 5 * 4 =", hint: "Najpierw wykonaj mnożenie 5 * 4, a następnie dodaj wynik do 25.", answers: ["45"] },
                    { id: 2, text: "Oblicz: (36 - 12) / 4 + 8 =", hint: "Najpierw wykonaj działanie w nawiasie (36 - 12), potem podziel wynik przez 4, a na końcu dodaj 8.", answers: ["14"] },
                    { id: 3, text: "Oblicz: 48 / 6 * 2 =", hint: "Mnożenie i dzielenie są równorzędne. Wykonaj działania od lewej do prawej: najpierw dzielenie, potem mnożenie.", answers: ["16"] },
                    { id: 4, text: "Oblicz: 50 - 3 * (12 - 4) + 6 =", hint: "Zacznij od nawiasu (12 - 4). Następnie pomnóż wynik przez 3. W kolejnym kroku wykonaj odejmowanie od 50 i na koniec dodaj 6.", answers: ["32"] },
                    { id: 5, text: "Oblicz: 70 - 40 / 5 + 3 * 4 =", hint: "Najpierw wykonaj dzielenie (40 / 5) oraz mnożenie (3 * 4). Na końcu wykonaj odejmowanie i dodawanie od lewej do prawej.", answers: ["74"] }
                ]
            },
            {
                title: "Blok 2: Zadania tekstowe – „Zakupy i pieniądze”",
                theory: "<b>Ważne na konkursie:</b> Przeczytaj uważnie treść zadania. Aby dowiedzieć się, ile pieniędzy było na początku, musisz obliczyć łączny koszt wszystkich zakupów i dodać do niego resztę, która została w portfelu.",
                tasks: [
                    { id: 6, text: "Antek poszedł do sklepu zoologicznego. Kupił zabawkę dla psa za 16 zł, dwie paczki przysmaków po 9 zł każda oraz obrożę za 24 zł. Po zapłaceniu zostało mu 6 zł reszty. Ile pieniędzy miał Antek przed wejściem do sklepu? (Podaj samą liczbę)", hint: "Oblicz koszt przysmaków: 2 * 9 zł. Dodaj zabawkę (16 zł) i obrożę (24 zł). Do tej sumy dodaj 6 zł reszty.", answers: ["64"] },
                    { id: 7, text: "Lena kupiła na kiermaszu książkowym gruby notes za 15 zł, trzy zakładki do książek po 4 zł za sztukę i kolorowy długopis za 7 zł. W portfelu zostało jej 11 zł reszty. Ile pieniędzy na kiermasz dostała Lena od mamy? (Podaj samą liczbę)", hint: "Trzy zakładki to 3 * 4 zł = 12 zł. Dodaj cenę notesu (15 zł), długopisu (7 zł) oraz resztę (11 zł).", answers: ["45"] },
                    { id: 8, text: "Szymon kupował prowiant na wycieczkę rowerową. Wybrał dwa batony energetyczne po 6 zł każdy, dużą butelkę napoju za 8 zł i paczkę orzeszków za 13 zł. Kasjerka wydała mu 17 zł reszty. Z jakim banknotem Szymon podszedł do kasy? (Podaj samą liczbę)", hint: "Oblicz koszt batonów: 2 * 6 zł. Dodaj napój (8 zł) i orzeszki (13 zł). Dodaj resztę (17 zł), aby poznać wartość banknotu.", answers: ["50"] },
                    { id: 9, text: "Nadia kupiła w sklepie papierniczym duży blok rysunkowy za 11 zł, dwa zestawy naklejek po 8 zł za każdy oraz pudełko plasteliny za 14 zł. Przyniosła do domu 7 zł reszty. Ile pieniędzy miała Nadia na początku? (Podaj samą liczbę)", hint: "Dwa zestawy naklejek to 2 * 8 zł = 16 zł. Dodaj blok (11 zł), plastelinę (14 zł) oraz resztę (7 zł).", answers: ["48"] },
                    { id: 10, text: "Filip robił zakupy w warzywniaku. Kupił kilogram jabłek za 5 zł, dwa kilogramy borówek po 18 zł za kilogram oraz siatkę ziemniaków za 9 zł. Zostało mu dokładnie 10 zł reszty. Ile pieniędzy dostał Filip od dziadka na te zakupy? (Podaj samą liczbę)", hint: "Borówki kosztowały 2 * 18 zł = 36 zł. Dodaj jabłka (5 zł), ziemniaki (9 zł) oraz resztę, która mu została (10 zł).", answers: ["60"] }
                ]
            },
            {
                title: "Blok 3: Dodawanie i odejmowanie ułamków dziesiętnych",
                theory: "<b>Ważne na konkursie:</b> Przy działaniach pisemnych na ułamkach dziesiętnych kluczowe jest podpisanie liczb <b>przecinek pod przecinkiem</b>! Jeśli liczby mają różną liczbę cyfr po przecinku, dopisz na końcu zera (np. 27,4 zamień na 27,40).",
                tasks: [
                    { id: 11, text: "Oblicz: 14,85 + 27,4 =", hint: "Dopisz zero do drugiej liczby, aby wyrównać rzędy: 14,85 + 27,40. Dodawaj od końca, pamiętając o przecinku.", answers: ["42.25", "42,25"] },
                    { id: 12, text: "Oblicz: 6,07 + 13,94 =", hint: "Podpisz równo pod sobą. 7 + 4 = 11 (1 dalej), 0 + 9 + 1 = 10 (1 dalej). Pamiętaj o przecinku we właściwym miejscu.", answers: ["20.01", "20,01"] },
                    { id: 13, text: "Oblicz: 0,584 + 1,26 =", hint: "Dopisz zero na końcu drugiej liczby: 0,584 + 1,260. Dodaj liczby pisemnie.", answers: ["1.844", "1,844"] },
                    { id: 14, text: "Oblicz: 45,9 + 7,15 =", hint: "Wyrównaj cyfry po przecinku: 45,90 + 7,15. Pamiętaj o poprawnym przenoszeniu dziesiątek.", answers: ["53.05", "53,05"] },
                    { id: 15, text: "Oblicz: 128,34 + 84,7 =", hint: "Zmień drugą liczbę na 84,70. Podpisz uważnie pod sobą rzędy jedności, dziesiątek i części ułamkowych.", answers: ["213.04", "213,04"] },
                    { id: 16, text: "Oblicz: 50,03 - 14,27 =", hint: "Pamiętaj o pożyczaniu od sąsiednich rzędów przez zera. Odejmuj pisemnie: 3 - 7 wymaga pożyczenia.", answers: ["35.76", "35,76"] },
                    { id: 17, text: "Oblicz: 100,1 - 45,36 =", hint: "Dopisz zero do pierwszej liczby, aby móc odjąć: 100,10 - 45,36. Wykonaj odejmowanie z pożyczaniem.", answers: ["54.74", "54,74"] },
                    { id: 18, text: "Oblicz: 7,004 - 2,815 =", hint: "Odejmuj uważnie cyfra po cyfrze od prawej do lewej, pożyczając od 7 na samym początku.", answers: ["4.189", "4,189"] },
                    { id: 19, text: "Oblicz: 300,05 - 168,4 =", hint: "Dopisz zero do odjemnika: 300,05 - 168,40. Wykonaj starannie odejmowanie w słupku.", answers: ["131.65", "131,65"] },
                    { id: 20, text: "Oblicz: 20,008 - 9,43 =", hint: "Wyrównaj liczbę miejsc po przecinku: 20,008 - 9,430. Odejmij w słupku.", answers: ["10.578", "10,578"] }
                ]
            }
        ];

        const container = document.getElementById("tasks-container");
        let totalTasksCount = 0;

        // GENEROWANIE STRUKTURY Z PODZIAŁEM NA BLOKI
        sectionsData.forEach((section) => {
            container.innerHTML += `
                <div class="section-header">
                    <h2>${section.title}</h2>
                </div>
                <div class="section-theory">
                    ${section.theory}
                </div>
            `;

            section.tasks.forEach((task) => {
                totalTasksCount++;
                resultsData[task.id] = "Nie rozwiązano"; 

                const answersJson = JSON.stringify(task.answers).replace(/"/g, "'");
                const firstAnswer = task.answers[0];

                container.innerHTML += `
                    <div class="task-card" id="card${task.id}">
                        <div class="task-text"><strong>${task.id}.</strong> ${task.text}</div>
                        <div class="input-group">
                            <input type="text" id="input${task.id}" placeholder="Wpisz odpowiedź...">
                            <button onclick="checkAnswer(${task.id}, 'input${task.id}', 'card${task.id}', 'feedback${task.id}', ${answersJson}, 'btn-answer${task.id}')">Sprawdź</button>
                            <button class="btn-hint" onclick="document.getElementById('hint${task.id}').style.display='block'">Podpowiedź</button>
                            
                            <button class="btn-answer" id="btn-answer${task.id}" style="display: none;" onclick="showAnswer(${task.id}, 'input${task.id}', '${firstAnswer}', 'card${task.id}', 'feedback${task.id}', 'btn-answer${task.id}')">Odpowiedź</button>
                            
                            <span id="feedback${task.id}" class="feedback"></span>
                        </div>
                        <div id="hint${task.id}" class="hint-text">${task.hint}</div>
                    </div>
                `;
            });
        });

        function checkAnswer(taskNum, inputId, cardId, feedbackId, correctAnswers, btnAnswerId) {
            let userInput = document.getElementById(inputId).value;
            let feedbackEl = document.getElementById(feedbackId);
            let cardEl = document.getElementById(cardId);
            let btnAnswer = document.getElementById(btnAnswerId);
            
            cardEl.classList.remove("correct-bg", "incorrect-bg");

            let normalized = userInput.replace(/\s+/g, '').toLowerCase().replace(',', '.');
            if (normalized === "") return (feedbackEl.textContent = "Wpisz odpowiedź!", feedbackEl.className = "feedback incorrect");

            if (userAttempts[inputId] === undefined) userAttempts[inputId] = new Set();

            let isCorrect = correctAnswers.some(ans => ans.toLowerCase() === normalized || ans.toLowerCase().replace('.', ',') === normalized.replace('.', ','));

            if (isCorrect) {
                feedbackEl.textContent = "Dobrze!"; 
                feedbackEl.className = "feedback correct"; 
                cardEl.classList.add("correct-bg");
                btnAnswer.style.display = "none";
                
                if(resultsData[taskNum] !== "Podglądał odpowiedź") {
                    resultsData[taskNum] = "Samodzielnie";
                }
            } else {
                if (userAttempts[inputId].has(userInput)) {
                    feedbackEl.textContent = "Już podałeś taką odpowiedź. Spróbuj inną!";
                } else {
                    userAttempts[inputId].add(userInput);
                    feedbackEl.textContent = "Spróbuj jeszcze raz.";
                }
                feedbackEl.className = "feedback incorrect"; 
                cardEl.classList.add("incorrect-bg");
                
                if (userAttempts[inputId].size >= 2) {
                    btnAnswer.style.display = "inline-block";
                }
            }
        }

        function showAnswer(taskNum, inputId, correctAnswer, cardId, feedbackId, btnAnswerId) {
            document.getElementById(inputId).value = correctAnswer;
            document.getElementById(cardId).classList.remove("incorrect-bg");
            document.getElementById(cardId).classList.add("correct-bg");
            document.getElementById(feedbackId).innerHTML = "Oto prawidłowa odpowiedź!";
            document.getElementById(feedbackId).className = "feedback correct";
            document.getElementById(btnAnswerId).style.display = "none";
            
            resultsData[taskNum] = "Podglądał odpowiedź";
        }

        function sendResults() {
            let correctCount = 0; let hintCount = 0; let notSolvedCount = 0;
            let detailedReport = "";

            for(let i=1; i<=totalTasksCount; i++) {
                let inputId = 'input' + i;
                let currentInputVal = document.getElementById(inputId).value.trim();
                let attemptsSet = userAttempts[inputId];
                let wrongAttemptsString = (attemptsSet && attemptsSet.size > 0) ? Array.from(attemptsSet).join(", ") : "";

                if(resultsData[i] === "Samodzielnie") {
                    correctCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Błędy przed sukcesem: ${wrongAttemptsString} | Odpowiedź końcowa: ${currentInputVal})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Odpowiedź: ${currentInputVal})\n`;
                    }
                }
                else if(resultsData[i] === "Podglądał odpowiedź") {
                    hintCount++;
                    detailedReport += `Zadanie ${i}: Podglądał odpowiedź (Błędne próby ucznia: ${wrongAttemptsString || "brak, od razu nacisnął podpowiedź"})\n`;
                }
                else {
                    notSolvedCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Błędne próby: ${wrongAttemptsString})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Pole puste)\n`;
                    }
                }
            }

            const finalMessage = `Uczeń: ${currentStudent}\nKlasa: ${currentClass}\n\nWYNIK GŁÓWNY:\n- Rozwiązane samodzielnie: ${correctCount} z ${totalTasksCount}\n- Z użyciem gotowej odpowiedzi: ${hintCount} z ${totalTasksCount}\n- Brak odpowiedzi: ${notSolvedCount} z ${totalTasksCount}\n\nSZCZEGÓŁY:\n${detailedReport}`;

            const btnSubmit = document.getElementById("btn-submit");
            btnSubmit.textContent = "Wysyłanie...";
            btnSubmit.style.backgroundColor = "#7f8c8d";
            btnSubmit.disabled = true;

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    access_key: "99356b6c-ab77-4ea0-a3cb-99560d40fafa",
                    subject: `Wyniki konkursowe klasa 4: ${currentStudent} (${currentClass})`,
                    from_name: "Trener Olimpijski klasa 4",
                    message: finalMessage
                })
            })
            .then(async (response) => {
                if (response.status == 200) {
                    document.getElementById("finish-text").innerText = "Udało się! Wyniki przygotowania zostały wysłane do nauczyciela. Możesz zamknąć stronę.";
                    btnSubmit.style.display = "none";
                } else {
                    document.getElementById("finish-text").innerText = "Błąd wysyłania. Zgłoś to nauczycielowi.";
                    btnSubmit.textContent = "Spróbuj ponownie";
                    btnSubmit.disabled = false;
                    btnSubmit.style.backgroundColor = "#e74c3c";
                }
            })
            .catch(error => {
                console.log(error);
                document.getElementById("finish-text").innerText = "Błąd połączenia. Sprawdź internet i spróbuj ponownie.";
                btnSubmit.textContent = "Wyślij ponownie";
                btnSubmit.disabled = false;
                btnSubmit.style.backgroundColor = "#e74c3c";
            });
        }
    </script>
</body>
</html>
