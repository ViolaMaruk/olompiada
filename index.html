<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szkolny Konkurs Matematyczny - Klasa 4</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .header-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        h1 {
            text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db;
            padding-bottom: 10px; margin-top: 0; margin-bottom: 15px;
        }
        .description { text-align: center; font-size: 1.1em; color: #555; margin: 0; }
        
        .section-header {
            background: #2c3e50; color: #fff; padding: 15px 20px; 
            margin-top: 40px; margin-bottom: 10px; border-radius: 8px;
        }
        .section-header h2 { margin: 0; font-size: 1.3em; }
        .section-theory {
            background: #eec15b3b; border-left: 4px solid #f39c12; 
            padding: 12px 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0;
            font-size: 0.95em; color: #444;
        }

        .task-card {
            background: #fff; padding: 20px 25px; margin-bottom: 20px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 6px solid #3498db; transition: all 0.3s;
        }
        .task-card.correct-bg { background-color: #d4edda; border-left-color: #28a745; }
        .task-card.incorrect-bg { background-color: #f8d7da; border-left-color: #dc3545; }
        .task-text { font-size: 1.1em; margin-bottom: 15px; }
        
        .input-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        input[type="text"] {
            padding: 10px; font-size: 1em; border: 2px solid #e2e8f0;
            border-radius: 6px; flex-grow: 1; max-width: 300px; outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        
        button {
            background-color: #3498db; color: white; border: none; padding: 10px 20px;
            font-size: 1em; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-hint { background-color: #f39c12; }
        button.btn-hint:hover { background-color: #d68910; }
        button.btn-answer { background-color: #9b59b6; }
        button.btn-answer:hover { background-color: #8e44ad; }
        
        .feedback { font-weight: bold; margin-left: 10px; }
        .correct { color: #1e8449; }
        .incorrect { color: #c0392b; }
        .hint-text { display: none; margin-top: 15px; padding: 12px; background-color: #fff3cd; border-left: 4px solid #ffc107; font-style: italic; color: #856404; border-radius: 0 6px 6px 0; }

        /* MODAL */
        #start-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 12px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content input {
            width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; text-align: center;
            font-size: 1.1em; border: 2px solid #e2e8f0; border-radius: 6px;
        }
        .modal-content button { width: 100%; font-size: 1.1em; padding: 12px; background-color: #27ae60;}
        .modal-content button:hover { background-color: #2ecc71;}
        
        #app-content { display: none; }
        
        .finish-container {
            text-align: center; background: rgba(255,255,255,0.95); padding: 30px;
            border-radius: 12px; margin-top: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .btn-finish { background-color: #e74c3c; font-size: 1.2em; padding: 15px 30px; }
        .btn-finish:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div id="start-modal">
        <div class="modal-content">
            <h2>Witaj! 👋</h2>
            <p>Przed rozpoczęciem treningu wpisz swoje dane:</p>
            <input type="text" id="student-name" placeholder="Imię i nazwisko" required>
            <input type="text" id="student-class" placeholder="Klasa (np. 4A)" required>
            <button onclick="startTest()">Rozpocznij trening</button>
            <p id="modal-error" style="color: red; font-size: 0.9em; display: none;">Proszę wypełnić wszystkie pola!</p>
        </div>
    </div>

    <div id="app-content">
        <div class="header-container">
            <h1>Szkolny Konkurs Matematyczny</h1>
            <p class="description">Rozwiąż zadania przygotowawcze podzielone na tematy. Przeczytaj uważnie wskazówki teoretyczne przed każdą sekcją!</p>
        </div>

        <div id="tasks-container"></div>

        <div class="finish-container">
            <h2 id="finish-text">Skończyłeś cały trening? Wyślij wyniki do nauczyciela!</h2>
            <button class="btn-finish" id="btn-submit" onclick="sendResults()">Wyślij wyniki 📧</button>
        </div>
    </div>

    <script>
        let currentStudent = "";
        let currentClass = "";
        let resultsData = {}; 
        let userAttempts = {};

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            const classInput = document.getElementById("student-class").value.trim();
            
            if(nameInput === "" || classInput === "") {
                document.getElementById("modal-error").style.display = "block";
                return;
            }
            
            currentStudent = nameInput;
            currentClass = classInput;
            
            document.getElementById("start-modal").style.display = "none";
            document.getElementById("app-content").style.display = "block";
        }

        // STRUKTURA PODZIELONA NA TEMATY
        const sectionsData = [
            {
                title: "Blok 1: Działania i terminy matematyczne",
                theory: "<b>Ważne na konkursie:</b> Pamiętaj o kolejności działań: najpierw nawiasy, potem mnożenie i dzielenie, na końcu dodawanie i odejmowanie. Zwróć uwagę na terminy: <i>suma</i> (+), <i>różnica</i> (-), <i>iloczyn</i> (*), <i>iloraz</i> (:).",
                tasks: [
                    { id: 1, text: "Oblicz wynik działania: 85 - 18 : 2 + 5 * (14 - 8)", hint: "Pamiętaj o kolejności działań: najpierw nawias, potem dzielenie i mnożenie, na końcu dodawanie i odejmowanie.", answers: ["106"] },
                    { id: 2, text: "W klasie jest 23 uczniów. Na lekcji plastyki nauczyciel dzieli ich na grupy po 5 osób. Ilu uczniów pozostanie bez grupy (reszta z dzielenia)?", hint: "Wykonaj dzielenie z resztą liczby 23 przez 5. Podaj tylko samą resztę.", answers: ["3"] },
                    { id: 3, text: "Zapisz w postaci równania: Sumę liczb 45 i 15 zmniejszono 5 razy i otrzymano wynik x.", hint: "Suma to dodawanie, zmniejszono 5 razy to dzielenie. Całość przyrównaj do x.", answers: ["(45+15):5=x", "(45+15)/5=x", "x=(45+15):5", "x=(45+15)/5", "12=x", "x=12"] },
                    { id: 4, text: "Zapisz w postaci wyrażenia i oblicz: Od iloczynu liczb 8 i 7 odejmij iloraz liczby 24 przez 4.", hint: "Iloczyn to mnożenie (8*7), iloraz to dzielenie (24:4). Odejmij drugi wynik od pierwszego.", answers: ["50"] },
                    { id: 5, text: "Wstaw odpowiedni znak działania (+, -, * lub :) w miejsce gwiazdki, aby równość była prawdziwa: 56 * (15 - 7) = 7", hint: "Najpierw oblicz wynik w nawiasie (15 - 7 = 8). Jakie działanie musisz wykonać na liczbach 56 i 8, aby otrzymać 7?", answers: [":", "/"] }
                ]
            },
            {
                title: "Blok 2: Znaki rzymskie",
                theory: "<b>Ważne na konkursie:</b> Jeśli mniejszy znak stoi przed większym, to go odejmujemy (IV=4, IX=9). Jeśli stoi po większym, dodajemy go (VI=6, XI=11). Pamiętaj, że ten sam znak nie może powtórzyć się 4 razy z rzędu!",
                tasks: [
                    { id: 6, text: "Zapisz cyframi arabskimi liczbę rzymską: XXXIV", hint: "XXX to 30, a IV to 4. Połącz te wartości.", answers: ["34"] },
                    { id: 7, text: "Zapisz znakami rzymskimi liczbę: 29", hint: "29 składa się z dwóch dziesiątek (XX) i dziewiątki (IX). Używaj wielkich liter.", answers: ["XXIX"] },
                    { id: 8, text: "Jaka liczba ukrywa się pod znakiem zapytania? Zapisz odpowiedź liczbą rzymską: XXV - ? = XIV", hint: "Zamień liczby na arabskie: 25 - ? = 14. Znajdź niewiadomą i zapisz ją ponownie jako liczbę rzymską.", answers: ["XI"] },
                    { id: 9, text: "Równanie ułożone z zapałek jest błędne: XII - V = IV. Przełóż tylko jedną zapałkę, aby równanie stało się prawdziwe. Zapisz nowe poprawne równanie (użyj znaku + lub =).", hint: "Spróbuj zmienić liczbę XII w inną liczbę rzymską lub zamienić znak minus na plus.", answers: ["v+v=x", "vi+iv=x"] }
                ]
            },
            {
                title: "Blok 3: Zamiana jednostek (Masa, Długość, Czas)",
                theory: "<b>Ważne na konkursie:</b> Uważaj na jednostki masy popularne w Polsce: <b>1 kg = 100 dag = 1000 g</b> (czyli 1 dag = 10 g). Przy jednostkach czasu pamiętaj, że 1 godzina to 60 minut, a nie 100!",
                tasks: [
                    { id: 10, text: "Wstaw odpowiedni znak (<, > lub =) w miejsce kropek: 4 kg 5 dag .... 450 dag", hint: "Pamiętaj, że 1 kg = 100 dag. Zatem 4 kg 5 dag to ile dekagramów?", answers: ["<"] },
                    { id: 11, text: "Tata kupił 40 dag sera, 20 dag szynki i 1 kg pomidorów. Ile gramów (g) ważą zakupy razem?", hint: "Zamień wszystko na gramy: 1 dag = 10 g, 1 kg = 1000 g. Potem dodaj wszystko do siebie.", answers: ["1600", "1600g"] },
                    { id: 12, text: "Kamil jechał na rowerze przez 180 minut. Ile to godzin?", hint: "Jedna godzina ma 60 minut. Podziel 180 przez 60.", answers: ["3", "3h", "3godziny"] },
                    { id: 13, text: "Przedstawienie teatralne rozpoczęło się o godzinie 12:40 i trwało dokładnie 90 minut. O której godzinie przedstawienie się skończyło? (Zapisz w formacie GG:MM)", hint: "90 minut to 1 godzina i 30 minut. Dodaj ten czas do godziny 12:40.", answers: ["14:10"] }
                ]
            },
            {
                title: "Blok 4: Geometria i skala",
                theory: "<b>Ważne na konkursie:</b> Prostokąt ma 4 boki (dwie długości i dwie szerokości). Pamiętaj, że średnica (<i>średnica</i>) to dwa promienie (<i>promień</i>): <b>d = 2r</b>. Skala 1:200 oznacza, że obiekt w rzeczywistości jest 200 razy większy.",
                tasks: [
                    { id: 14, text: "Obwód prostokąta wynosi 50 cm. Jego długość to 15 cm. Znajdź szerokość tego prostokąta (w cm).", hint: "Prostokąt ma dwie długości i dwie szerokości. Odejmij dwie długości od obwodu (50 - 30) i wynik podziel przez 2.", answers: ["10", "10cm"] },
                    { id: 15, text: "Bok kwadratu ma długość 1 dm 5 cm. Oblicz obwód tego kwadratu w centymetrach.", hint: "Zamień bok na centymetry: 1 dm 5 cm = 15 cm. Kwadrat ma 4 równe boki, więc pomnóż wynik przez 4.", answers: ["60", "60cm"] },
                    { id: 16, text: "Na stole ułożono w jednym rzędzie, ściśle obok siebie, 4 jednakowe żetony. Promień jednego żetonu wynosi 15 mm. Jaką długość ma cały rząd żetonów (w mm)?", hint: "Szerokość żetonu to jego średnica (dwa promienie), czyli 30 mm. Pomnóż to przez 4 żetony.", answers: ["120", "120mm"] },
                    { id: 17, text: "Na mapie w skali 1:300 długość ścieżki wynosi 4 cm. Ile metrów wynosi rzeczywista długość tej ścieżki?", hint: "Pomnóż 4 cm przez 300, aby otrzymać wynik w centymetrach (1200 cm). Następnie zamień centymetry na metry.", answers: ["12", "12m"] }
                ]
            },
            {
                title: "Blok 5: Średnia arytmetyczna",
                theory: "<b>Ważne na konkursie:</b> Aby obliczyć średnią, dodaj wszystkie liczby do siebie, a wynik podziel przez ich ilość. Jeśli w danych pojawia się liczba 0 (np. mecz bez bramek), musisz ją dodać do sumy, a sam mecz wliczyć do dzielenia!",
                tasks: [
                    { id: 18, text: "Temperatura powietrza w ciągu czterech dni wynosiła odpowiednio: 10°C, 14°C, 16°C i 12°C. Oblicz średnią temperaturę z tych dni.", hint: "Dodaj wszystkie cztery temperatury do siebie, a następnie podziel otrzymaną sumę przez 4.", answers: ["13"] },
                    { id: 19, text: "Hokeista w 5 meczach zdobył następującą liczbę punktów: 3, 0, 2, 1, 4. Jaka jest jego średnia liczba punktów na mecz?", hint: "Dodaj wszystkie punkty (suma wynosi 10) i podziel przez liczbę wszystkich meczów, czyli przez 5.", answers: ["2"] },
                    { id: 20, text: "Średni wzrost dwóch skrzatów wynosi 35 cm. Wzrost pierwszego z nich to 30 cm. Jaki wzrost ma drugi skrzat?", hint: "Skoro średnia dwóch wynosi 35 cm, to razem mają 35 * 2 = 70 cm. Odejmij wzrost pierwszego skrzata.", answers: ["40", "40cm"] }
                ]
            },
            {
                title: "Blok 6: Zadania logiczne",
                theory: "<b>Ważne na konkursie:</b> Zwracaj uwagę na odległości i cięcia. Liczba części jest zawsze o 1 większa niż liczba cięć (np. 2 cięcia dają 3 części). Inaczej jest w zadaniach z płotami i drzewami, gdzie na końcach też stoją obiekty.",
                tasks: [
                    { id: 21, text: "Prosty płot o długości 40 metrów ma słupki rozstawione co 5 metrów. Ile słupków użyto do budowy tego płotu, jeśli słupki stoją na samym jego początku i na samym końcu?", hint: "Podział 40 : 5 = 8 daje liczbę odstępów między słupkami. Słupków jest o jeden więcej niż odstępów.", answers: ["9"] },
                    { id: 22, text: "Przecięcie deski na 3 części zajmuje stolarzowi 4 minuty. Ile czasu zajmie mu przecięcie takiej samej deski na 5 części?", hint: "Aby mieć 3 części, trzeba zrobić 2 cięcia (jedno cięcie trwa 2 minuty). Aby mieć 5 części, trzeba wykonać 4 cięcia.", answers: ["8", "8min"] },
                    { id: 23, text: "Pomyślałem pewną liczbę x. Pomnożyłem ją przez 4, od rezultatu odjąłem 6 i otrzymałem 26. Zapisz to równanie.", hint: "Pomnożenie x przez 4 to 4x. Odejmij 6 i przyrównaj do 26.", answers: ["4x-6=26", "x*4-6=26", "26=4x-6"] },
                    { id: 24, text: "Na łące pasą się gęsie (2 nogi) i owce (4 nogi). Razem mają 8 głów i 22 nogi. Ile owiec pasie się na łące?", hint: "Gdyby wszystkie zwierzęta były gęsiami, miałyby 16 nóg. Mamy 6 dodatkowych nóg, podziel je po 2 na każdą owcę.", answers: ["3"] }
                ]
            },
            {
                title: "Zadania z gwiazdką (*) - Poziom Olimpijski",
                theory: "<b>Najwyższy poziom trudności:</b> Te zadania wymagają nieszablonowego myślenia. Uważaj na cykle kalendarzowe (tydzień ma 7 dni), zmianę obwodu przy łączeniu figur oraz skomplikowane liczby rzymskie (np. 99 zapisujemy jako XC i IX oddzielnie).",
                tasks: [
                    { id: 25, text: "* [Zadanie Olimpijskie] Dzisiaj jest czwartek. Jaki dzień tygodnia będzie za 45 dni?", hint: "Podziel 45 przez 7 dni tygodnia. Sprawdź resztę z dzielenia (reszta to 3) i przesuń się o tyle dni do przodu od czwartku.", answers: ["niedziela"] },
                    { id: 26, text: "* [Zadanie Olimpijskie] Cztery jednakowe kwadraty, każdy o obwodzie 16 cm, ułożono obok siebie w jednym rzędzie tak, że powstał duży prostokąt. Oblicz obwód tego prostokąta.", hint: "Bok kwadratu to 16:4 = 4 cm. Nowy prostokąt składa się z 4 takich kwadratów, więc jego wymiary to 16 cm na 4 cm. Oblicz jego obwód.", answers: ["40", "40cm"] },
                    { id: 27, text: "* [Zadanie Olimpijskie] Zapisz za pomocą znaków rzymskich liczbę: 94", hint: "Zapisz oddzielnie 90 (XC) oraz 4 (IV). Połącz te znaki.", answers: ["XCIV"] }
                ]
            }
        ];

        const container = document.getElementById("tasks-container");
        let totalTasksCount = 0;

        // GENEROWANIE STRUKTURY Z PODZIAŁEM NA BLOKI
        sectionsData.forEach((section) => {
            // Dodanie nagłówka sekcji
            container.innerHTML += `
                <div class="section-header">
                    <h2>${section.title}</h2>
                </div>
                <div class="section-theory">
                    ${section.theory}
                </div>
            `;

            // Dodanie zadań z danej sekcji
            section.tasks.forEach((task) => {
                totalTasksCount++;
                resultsData[task.id] = "Nie rozwiązano"; 

                const answersJson = JSON.stringify(task.answers).replace(/"/g, "'");
                const firstAnswer = task.answers[0];

                container.innerHTML += `
                    <div class="task-card" id="card${task.id}">
                        <div class="task-text"><strong>${task.id}.</strong> ${task.text}</div>
                        <div class="input-group">
                            <input type="text" id="input${task.id}" placeholder="Wpisz odpowiedź...">
                            <button onclick="checkAnswer(${task.id}, 'input${task.id}', 'card${task.id}', 'feedback${task.id}', ${answersJson}, 'btn-answer${task.id}')">Sprawdź</button>
                            <button class="btn-hint" onclick="document.getElementById('hint${task.id}').style.display='block'">Podpowiedź</button>
                            
                            <button class="btn-answer" id="btn-answer${task.id}" style="display: none;" onclick="showAnswer(${task.id}, 'input${task.id}', '${firstAnswer}', 'card${task.id}', 'feedback${task.id}', 'btn-answer${task.id}')">Odpowiedź</button>
                            
                            <span id="feedback${task.id}" class="feedback"></span>
                        </div>
                        <div id="hint${task.id}" class="hint-text">${task.hint}</div>
                    </div>
                `;
            });
        });

        function checkAnswer(taskNum, inputId, cardId, feedbackId, correctAnswers, btnAnswerId) {
            let userInput = document.getElementById(inputId).value;
            let feedbackEl = document.getElementById(feedbackId);
            let cardEl = document.getElementById(cardId);
            let btnAnswer = document.getElementById(btnAnswerId);
            
            cardEl.classList.remove("correct-bg", "incorrect-bg");

            let normalized = userInput.replace(/\s+/g, '').toLowerCase().replace(',', '.');
            if (normalized === "") return (feedbackEl.textContent = "Wpisz odpowiedź!", feedbackEl.className = "feedback incorrect");

            if (userAttempts[inputId] === undefined) userAttempts[inputId] = new Set();

            let isCorrect = correctAnswers.some(ans => ans.toLowerCase() === normalized || ans.toLowerCase().replace('.', ',') === normalized.replace('.', ','));

            if (isCorrect) {
                feedbackEl.textContent = "Dobrze!"; 
                feedbackEl.className = "feedback correct"; 
                cardEl.classList.add("correct-bg");
                btnAnswer.style.display = "none";
                
                if(resultsData[taskNum] !== "Podglądał odpowiedź") {
                    resultsData[taskNum] = "Samodzielnie";
                }
            } else {
                if (userAttempts[inputId].has(userInput)) {
                    feedbackEl.textContent = "Już podałeś taką odpowiedź. Spróbuj inną!";
                } else {
                    userAttempts[inputId].add(userInput);
                    feedbackEl.textContent = "Spróbuj jeszcze raz.";
                }
                feedbackEl.className = "feedback incorrect"; 
                cardEl.classList.add("incorrect-bg");
                
                if (userAttempts[inputId].size >= 2) {
                    btnAnswer.style.display = "inline-block";
                }
            }
        }

        function showAnswer(taskNum, inputId, correctAnswer, cardId, feedbackId, btnAnswerId) {
            document.getElementById(inputId).value = correctAnswer;
            document.getElementById(cardId).classList.remove("incorrect-bg");
            document.getElementById(cardId).classList.add("correct-bg");
            document.getElementById(feedbackId).innerHTML = "Oto prawidłowa odpowiedź!";
            document.getElementById(feedbackId).className = "feedback correct";
            document.getElementById(btnAnswerId).style.display = "none";
            
            resultsData[taskNum] = "Podglądał odpowiedź";
        }

        function sendResults() {
            let correctCount = 0; let hintCount = 0; let notSolvedCount = 0;
            let detailedReport = "";

            for(let i=1; i<=totalTasksCount; i++) {
                let inputId = 'input' + i;
                let currentInputVal = document.getElementById(inputId).value.trim();
                let attemptsSet = userAttempts[inputId];
                let wrongAttemptsString = (attemptsSet && attemptsSet.size > 0) ? Array.from(attemptsSet).join(", ") : "";

                if(resultsData[i] === "Samodzielnie") {
                    correctCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Błędy przed sukcesem: ${wrongAttemptsString} | Odpowiedź końcowa: ${currentInputVal})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Odpowiedź: ${currentInputVal})\n`;
                    }
                }
                else if(resultsData[i] === "Podglądał odpowiedź") {
                    hintCount++;
                    detailedReport += `Zadanie ${i}: Podglądał odpowiedź (Błędne próby ucznia: ${wrongAttemptsString || "brak, od razu nacisnął podpowiedź"})\n`;
                }
                else {
                    notSolvedCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Błędne próby: ${wrongAttemptsString})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Pole puste)\n`;
                    }
                }
            }

            const finalMessage = `Uczeń: ${currentStudent}\nKlasa: ${currentClass}\n\nWYNIK GŁÓWNY:\n- Rozwiązane samodzielnie: ${correctCount} z ${totalTasksCount}\n- Z użyciem gotowej odpowiedzi: ${hintCount} z ${totalTasksCount}\n- Brak odpowiedzi: ${notSolvedCount} z ${totalTasksCount}\n\nSZCZEGÓŁY:\n${detailedReport}`;

            const btnSubmit = document.getElementById("btn-submit");
            btnSubmit.textContent = "Wysyłanie...";
            btnSubmit.style.backgroundColor = "#7f8c8d";
            btnSubmit.disabled = true;

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    access_key: "99356b6c-ab77-4ea0-a3cb-99560d40fafa",
                    subject: `Wyniki konkursowe klasa 4: ${currentStudent} (${currentClass})`,
                    from_name: "Trener Olimpijski klasa 4",
                    message: finalMessage
                })
            })
            .then(async (response) => {
                if (response.status == 200) {
                    document.getElementById("finish-text").innerText = "Udało się! Wyniki przygotowania zostały wysłane do nauczyciela. Możesz zamknąć stronę.";
                    btnSubmit.style.display = "none";
                } else {
                    document.getElementById("finish-text").innerText = "Błąd wysyłania. Zgłoś to nauczycielowi.";
                    btnSubmit.textContent = "Spróbuj ponownie";
                    btnSubmit.disabled = false;
                    btnSubmit.style.backgroundColor = "#e74c3c";
                }
            })
            .catch(error => {
                console.log(error);
                document.getElementById("finish-text").innerText = "Błąd połączenia. Sprawdź internet i spróbuj ponownie.";
                btnSubmit.textContent = "Wyślij ponownie";
                btnSubmit.disabled = false;
                btnSubmit.style.backgroundColor = "#e74c3c";
            });
        }
    </script>
</body>
</html>
